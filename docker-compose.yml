services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./dharmagpt/.env
    volumes:
      - ./dharmagpt/knowledge:/app/dharmagpt/knowledge
      - ./data:/app/data
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
