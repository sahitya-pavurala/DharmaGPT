services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dharmagpt}
      POSTGRES_USER: ${POSTGRES_USER:-dharmagpt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-beta-postgres-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dharmagpt} -d ${POSTGRES_DB:-dharmagpt}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./dharmagpt/.env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-dharmagpt}:${POSTGRES_PASSWORD:-change-me-beta-postgres-password}@db:5432/${POSTGRES_DB:-dharmagpt}
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./dharmagpt/knowledge:/app/dharmagpt/knowledge
      - ./data:/app/data
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:2026.3.0
    profiles:
      - tunnel
    depends_on:
      nginx:
        condition: service_healthy
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN:-}
    restart: unless-stopped

volumes:
  postgres_data:
