services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./dharmagpt/.env
    volumes:
      - ./dharmagpt/knowledge:/app/dharmagpt/knowledge
      - ./data:/app/data
    expose:
      - "8000"
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dharmagpt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
