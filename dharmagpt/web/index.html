<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DharmaGPT Beta</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="conversation" aria-label="DharmaGPT conversation">
        <header class="topbar">
          <div>
            <p class="eyebrow">DharmaGPT Beta</p>
            <h1>Ask with care. Read with sources.</h1>
          </div>
          <div class="status" id="healthStatus">Checking</div>
        </header>

        <div class="messages" id="messages" aria-live="polite">
          <article class="message assistant">
            <p>Namaste. Ask a question about dharma, stories, practice, or a text passage. I will answer from the beta API and show citations when they are available.</p>
          </article>
        </div>

        <form class="composer" id="queryForm">
          <div class="controls">
            <label>
              <span>Mode</span>
              <select id="mode">
                <option value="guidance">Guidance</option>
                <option value="story">Story</option>
                <option value="children">Children</option>
                <option value="scholar">Scholar</option>
              </select>
            </label>
            <label>
              <span>Language</span>
              <select id="language">
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="te">Telugu</option>
                <option value="ta">Tamil</option>
              </select>
            </label>
            <label class="api-key">
              <span>Beta key</span>
              <input id="apiKey" type="password" autocomplete="off" placeholder="X-API-Key" />
            </label>
          </div>
          <div class="prompt-row">
            <textarea id="query" minlength="2" maxlength="1000" rows="3" placeholder="What is dharma?" required></textarea>
            <button id="sendButton" type="submit">Ask</button>
          </div>
        </form>
      </section>
    </main>
    <script src="/static/app.js" defer></script>
  </body>
</html>
