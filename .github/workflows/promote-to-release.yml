name: Promote master to release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  open-release-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create or refresh release PR
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = 'release';
            const head = `${owner}:master`;

            const existing = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              base,
              head,
            });

            if (existing.length > 0) {
              core.info(`Release PR already open: #${existing[0].number}`);
              return;
            }

            const pr = await github.rest.pulls.create({
              owner,
              repo,
              title: 'Promote master to release',
              head: 'master',
              base,
              body: [
                'Automated promotion PR from `master` to `release`.',
                '',
                'Use this branch to stage the next production cutover.',
              ].join('\n'),
            });

            core.info(`Created release PR #${pr.data.number}`);
