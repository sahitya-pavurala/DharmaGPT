name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Unit and backend tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dharmagpt

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: dharmagpt/requirements.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit and backend tests
        run: PYTHONPATH=. python -m pytest tests/unit/ ../tests/backend -v -m "not smoke and not contract"

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request'
    env:
      OLLAMA_URL: http://127.0.0.1:11434
      OLLAMA_MODEL: qwen2.5:1.5b
      LLM_BACKEND: ollama
      EVALUATION_PRIMARY_BACKEND: ollama
      EVALUATION_SECONDARY_BACKEND: ollama

    defaults:
      run:
        working-directory: dharmagpt

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: dharmagpt/requirements.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for attempt in {1..30}; do
            if curl -fsS "${OLLAMA_URL}/api/tags" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/ollama.log
          exit 1

      - name: Pull local model
        run: |
          ollama pull "${OLLAMA_MODEL}"

      - name: Verify local model
        run: |
          ollama list
          ollama show "${OLLAMA_MODEL}"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        run: PYTHONPATH=. python -m pytest tests/integration/ -v --timeout=120

  smoke-contract:
    name: Smoke and contract tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    defaults:
      run:
        working-directory: dharmagpt

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: dharmagpt/requirements.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API smoke and contract tests
        run: PYTHONPATH=. python -m pytest ../tests/backend -v -m "smoke or contract"

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, smoke-contract]
    if: >-
      always()
      && needs.unit-tests.result == 'success'
      && (needs.integration-tests.result == 'success' || needs.integration-tests.result == 'skipped')
      && (needs.smoke-contract.result == 'success' || needs.smoke-contract.result == 'skipped')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dharmagpt-ci .
