name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - develop
      - master
      - release
      - release/**

jobs:
  unit-tests:
    name: Unit and backend tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dharmagpt

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: dharmagpt/requirements.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit and backend tests
        run: PYTHONPATH=. python -m pytest tests/unit/ ../tests/backend -v -m "not smoke and not contract"

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: >-
      (
        github.event_name == 'push' &&
        (
          github.ref == 'refs/heads/develop' ||
          github.ref == 'refs/heads/master' ||
          github.ref == 'refs/heads/release' ||
          startsWith(github.ref, 'refs/heads/release/')
        )
      ) ||
      (
        github.event_name == 'pull_request' &&
        (
          github.base_ref == 'develop' ||
          github.base_ref == 'master' ||
          github.base_ref == 'release' ||
          startsWith(github.base_ref, 'release/')
        )
      )
    env:
      OLLAMA_URL: http://127.0.0.1:11434
      OLLAMA_MODEL: qwen2.5:1.5b
      LLM_BACKEND: ollama
      EVALUATION_PRIMARY_BACKEND: ollama
      EVALUATION_SECONDARY_BACKEND: ollama

    defaults:
      run:
        working-directory: dharmagpt

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: dharmagpt/requirements.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for attempt in {1..30}; do
            if curl -fsS "${OLLAMA_URL}/api/tags" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/ollama.log
          exit 1

      - name: Pull local model
        run: |
          ollama pull "${OLLAMA_MODEL}"

      - name: Verify local model
        run: |
          ollama list
          ollama show "${OLLAMA_MODEL}"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        run: PYTHONPATH=. python -m pytest tests/integration/ -v --timeout=120

  smoke-contract:
    name: Smoke and contract tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: >-
      (
        github.event_name == 'push' &&
        (
          github.ref == 'refs/heads/master' ||
          github.ref == 'refs/heads/release' ||
          startsWith(github.ref, 'refs/heads/release/')
        )
      ) ||
      (
        github.event_name == 'pull_request' &&
        (
          github.base_ref == 'master' ||
          github.base_ref == 'release' ||
          startsWith(github.base_ref, 'release/')
        )
      )

    defaults:
      run:
        working-directory: dharmagpt

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: dharmagpt/requirements.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API smoke and contract tests
        run: PYTHONPATH=. python -m pytest ../tests/backend -v -m "smoke or contract"

  evaluation:
    name: RAG evaluation (Claude judge)
    runs-on: ubuntu-latest
    needs: unit-tests
    if: >-
      (
        github.event_name == 'push' &&
        (
          github.ref == 'refs/heads/master' ||
          github.ref == 'refs/heads/release' ||
          startsWith(github.ref, 'refs/heads/release/')
        )
      ) ||
      (
        github.event_name == 'pull_request' &&
        (
          github.base_ref == 'master' ||
          github.base_ref == 'release' ||
          startsWith(github.base_ref, 'release/')
        )
      )
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      PINECONE_INDEX_NAME: dharma-gpt
      LLM_BACKEND: anthropic
      RAG_BACKEND: pinecone
      EVALUATION_PRIMARY_BACKEND: anthropic
      EVALUATION_PRIMARY_MODEL: claude-haiku-4-5-20251001
      EVALUATION_SECONDARY_BACKEND: anthropic
      EVALUATION_SECONDARY_MODEL: claude-haiku-4-5-20251001

    defaults:
      run:
        working-directory: dharmagpt

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: dharmagpt/requirements.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run evaluation (10 questions, fail if pass rate < 80%)
        run: |
          PYTHONPATH=. python scripts/run_evaluation.py \
            --limit 10 \
            --fail-below 0.80 \
            --output evaluation/reports/ci_latest.jsonl

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.sha }}
          path: dharmagpt/evaluation/reports/ci_latest.jsonl

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, smoke-contract, evaluation]
    if: >-
      always()
      && needs.unit-tests.result == 'success'
      && (needs.integration-tests.result == 'success' || needs.integration-tests.result == 'skipped')
      && (needs.smoke-contract.result == 'success' || needs.smoke-contract.result == 'skipped')
      && (needs.evaluation.result == 'success' || needs.evaluation.result == 'skipped')
      && (
        (
          github.event_name == 'push' &&
          (
            github.ref == 'refs/heads/master' ||
            github.ref == 'refs/heads/release' ||
            startsWith(github.ref, 'refs/heads/release/')
          )
        ) ||
        (
          github.event_name == 'pull_request' &&
          (
            github.base_ref == 'master' ||
            github.base_ref == 'release' ||
            startsWith(github.base_ref, 'release/')
          )
        )
      )

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dharmagpt-ci .
